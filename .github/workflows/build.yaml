name: Build
on: [pull_request, push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v6
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: 17
          cache: gradle
      - name: Unit tests and lint
        run: ./gradlew testDebugUnitTest lintDebug
      - name: Upload test and lint reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-and-lint-reports
          path: |
            app/build/reports/tests/
            app/build/reports/lint-results-debug.html
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v6
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: 17
          cache: gradle
      - name: Decode Keystore
        # tr + -i match the leniency of Node's Buffer.from(..., 'base64'):
        # ignore whitespace/non-alphabet bytes in the base64-encoded secret.
        run: echo "${{ secrets.KEYSTORE }}" | tr -d '[:space:]' | base64 -di > "$RUNNER_TEMP/android_keystore.keystore"
      - name: Build the app
        run: ./gradlew assembleRelease -Pandroid.injected.signing.store.file=$RUNNER_TEMP/android_keystore.keystore -Pandroid.injected.signing.store.password=${{ secrets.PASSWORD }} -Pandroid.injected.signing.key.alias=${{ secrets.ALIAS }} -Pandroid.injected.signing.key.password=${{ secrets.PASSWORD }}
      - name: Upload release APK
        uses: actions/upload-artifact@v7
        with:
          name: app-release.apk
          path: app/build/outputs/apk/release/app-release.apk
